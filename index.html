<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon/favicon.png" type="image/png">
    <title>E2W Company</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            position: relative;
            height: 210px;
        }
        #carousel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        nav {
            background-color: #000;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }
        nav a:hover,
        nav a:active,
        nav a:focus {
            color: #ffcc00;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #000;
            min-width: 160px;
            z-index: 1;
        }
        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background-color 0.3s;
        }
        .dropdown-content a:hover {
            background-color: #333;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        section {
            padding: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .item {
            width: 30%;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .search-bar {
            text-align: center;
            margin-bottom: 20px;
        }
        .search-bar input[type="text"] {
            padding: 10px;
            width: 50%;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        footer {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .popup {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <img id="carousel" src="img/banner1.png">
    </header>
    <nav>
        <div class="dropdown">
            <a href="javascript:void(0)">Roupas</a>
            <div class="dropdown-content">
                <a href="#" onclick="atualizarCampoPesquisa('Camiseta')">Camiseta</a>
                <a href="#" onclick="atualizarCampoPesquisa('Moletom')">Moletom</a>
                <a href="#" onclick="atualizarCampoPesquisa('Calça')">Calça</a>
            </div>
        </div>
        <a href="bitcoin.html">Bitcoin</a>
    </nav>

    <div id="popup" class="popup">
        <div class="popup-content">
            <h2>Site em Manutenção</h2>
            <p>Nosso site está passando por manutenção. Pedimos desculpas pelo inconveniente.</p>
            <button onclick="fecharPopup()">Fechar</button>
        </div>
    </div>
    <script src="js/popup.js"></script>

    <section id="roupas">
        <div class="search-bar">
            <input type="text" id="searchTerm1" placeholder="Pesquisar...">
            <button onclick="pesquisar(1)">Pesquisar</button>
        </div>
        <div class='container' id="output1">    
        </div>
    </section>

    <section id="outros-produtos">
        <div class="search-bar">
            <input type="text" id="searchTerm2" value="Camiseta" hidden>
        </div>
        <div class='container' id="output2">    
        </div>
    </section>
    
    <script>
    
    function pesquisar(secao) {
        let searchTerm;
        if (secao === 1) {
            searchTerm = document.getElementById("searchTerm1").value;
            limparProdutos("output1");
            limparProdutos("output2");
            fetchProdutos(searchTerm, "output1");
        } else if (secao === 2) {
            searchTerm = document.getElementById("searchTerm2").value;
            limparProdutos("output1");
            limparProdutos("output2");
            fetchProdutos(searchTerm, "output2");
        }
    }

    function limparProdutos(outputId) {
        const outputDiv = document.getElementById(outputId);
        outputDiv.innerHTML = '';
    }

    function fetchProdutos(searchTerm, outputId) {
        const url = `https://api.mercadolibre.com/sites/MLB/search?q=${searchTerm}&seller_id=306601213&limit=3`;

        const outputDiv = document.getElementById(outputId);

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erro ao requisitar o JSON');
                }
                return response.json();
            })
            .then(data => {
                const results = data.results;
                if (results.length === 0) {
                    const noResultsDiv = document.createElement('div');
                    noResultsDiv.textContent = 'Não foi encontrado esse produto';
                    outputDiv.appendChild(noResultsDiv);
                } else {
                    results.forEach(result => {
                        const resultDiv = document.createElement('div');
                        resultDiv.classList.add('item');
                        const prodDiv = "<img src='"+result.thumbnail+"'><h3>"+result.title+"</h3><p> R$ "+result.price+"</p><button onclick=\"window.location.href='"+result.permalink+"'\">Comprar</button>";
                        resultDiv.innerHTML = prodDiv;
                        outputDiv.appendChild(resultDiv);
                    });
                }
            })
            .catch(error => {
                console.error('Erro ao fazer a requisição:', error);
            });
    }
    window.addEventListener('load', () => {
        pesquisar(1); 
        pesquisar(2); 
    });

    function atualizarCampoPesquisa(valor) {
        document.getElementById("searchTerm1").value = valor;
        pesquisar(1);
    }
    
    </script>
    
    <!--Serviço -->
    <section id="bitcoin">
        <div class="container" style="padding: 20px;">
            <div class="item" style="width: 60%;">
                <img src="img/bitcoin.png" width="60px">
                <h3>Bitcoin</h3>
                <p id="bitcoinPrice">Loading...</p>
                <a href="bitcoin.html"><button style="background-color: #ffcc00;cursor: pointer;border-radius: 5px;color: black;">Compre Seu Bitcoin Aqui</button></a>
            </div>
        </div>
    <script>
        // Função para formatar o valor como moeda
        function formatCurrency(value) {
            return new Intl.NumberFormat('pr-BR', { style: 'currency', currency: 'BRL' }).format(value);
        }

        // Função para obter o preço do Bitcoin
        function getBitcoinPrice() {
            const apiUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=brl';

            // Fazendo uma requisição AJAX
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const bitcoinPrice = data.bitcoin.brl;
                    const formattedPrice = formatCurrency(bitcoinPrice);
                    document.getElementById('bitcoinPrice').textContent = `Preço Atual do Bitcoin: ${formattedPrice}`;
                })
                .catch(error => {
                    console.error('Erro ao obter o preço do Bitcoin:', error);
                    document.getElementById('bitcoinPrice').textContent = 'Erro ao obter o preço do Bitcoin';
                });
        }

        // Chamando a função ao carregar a página
        window.addEventListener('load', getBitcoinPrice);

        // Atualizando o preço a cada 5 minutos (300000 milissegundos)
        setInterval(getBitcoinPrice, 300000);
    </script>
    </section>

    <footer>
        © 2024 Elite Worldwide Company
        <br>
        <a href="https://www.instagram.com/eliteworldwidecompany/">Instagram</a>
    </footer>
</body>
</html>
