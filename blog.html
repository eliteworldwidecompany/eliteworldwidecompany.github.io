<body>

    <div style="padding-left: 30px;"><h2>Blog:</h2></div>
    <br>
    <div class="card-container" id="posts-container">
    </div>
      
    <script>
        const feedUrl = 'https://eliteworldwidecompany.pythonanywhere.com/feed';

        async function fetchAndDisplayPosts() {
          try {
            const response = await fetch(feedUrl);
            const data = await response.json();
      
            const postsContainer = document.getElementById('posts-container');
            postsContainer.innerHTML = '';
      
            data.forEach(post => {
              const card = document.createElement('a');
              card.classList.add('card');
              card.href = post.link;
              card.dataset.link = post.link;
              card.target = '_blank';
      
              const title = document.createElement('h2');
              title.textContent = post.title;
              title.classList.add('card-title');
      
              const description = document.createElement('p');
              description.textContent = post.content;
      
              const image = document.createElement('img');
              image.src = post.img;
              image.alt = post.title;

              
              card.appendChild(image);
              card.appendChild(title);
      
              document.getElementById('posts-container').appendChild(card);
            });
          } catch (error) {
            console.error('Erro ao carregar os posts:', error);
            document.getElementById('posts-container').innerHTML = "Erro ao carregar os posts";
          }
        }
      
        window.onload = fetchAndDisplayPosts;
    </script>

</body>
